name: Build & Release

# Triggers when you push a version tag: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  release:
    name: Build Windows zip & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (exact versions from lock file)
        run: npm ci

      # Fail the release if any high or critical vulnerability exists.
      # Fix it before tagging, or run `npm audit fix` and commit.
      - name: Security audit
        run: npm audit --audit-level=high

      # Download the same Node version that's running this job,
      # but the Windows x64 binary, so it's bundled into the zip.
      - name: Download Node.js Windows x64 binary
        run: |
          NODE_VERSION=$(node --version | sed 's/v//')
          echo "Bundling Node.js v${NODE_VERSION} for Windows x64"
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-win-x64.zip" \
               -o node-win.zip
          # Extract just node.exe from the nested folder
          unzip -j node-win.zip "*/node.exe" -d node-bin/

      - name: Assemble release package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PKG="FokkerPop-${VERSION}-windows"

          # Create directory structure
          mkdir -p "${PKG}/node"
          mkdir -p "${PKG}/assets/stickers"
          mkdir -p "${PKG}/assets/sounds"
          mkdir -p "${PKG}/characters"
          mkdir -p "${PKG}/plugins"

          # Bundled Node runtime
          cp node-bin/node.exe "${PKG}/node/"

          # Source files
          cp -r server dashboard "${PKG}/"
          cp overlay.html package.json package-lock.json \
             settings.example.json goals.example.json redeems.example.json flows.example.json \
             start.bat README.md \
             "${PKG}/"

          # Copy asset files from repo if they exist
          [ -d assets ]     && cp -r assets/.     "${PKG}/assets/"
          [ -d characters ] && cp -r characters/. "${PKG}/characters/"

          # Vendored node_modules — frozen at audited versions.
          # Exclude .bin/ (Unix symlinks — not needed on Windows).
          cp -r node_modules "${PKG}/"
          rm -rf "${PKG}/node_modules/.bin"

          # Zip it up
          zip -r "${PKG}.zip" "${PKG}/"

          echo "PKG=${PKG}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          PKG="FokkerPop-${VERSION}-windows"

          # Write release notes
          sed 's/^          //' > release-notes.md << NOTES
          ## FokkerPop v${VERSION}

          1. Download \`FokkerPop-${VERSION}-windows.zip\` below
          2. Extract it anywhere and run **start.bat**

          Note: Auto-Updater EXE is temporarily disabled while we fix a build snag.
          Please use the ZIP for this version!

          Node.js is bundled. No setup required.
          NOTES

          gh release create "${VERSION}" \
            "${PKG}.zip#FokkerPop ${VERSION} (Windows ZIP)" \
            --title "FokkerPop ${VERSION}" \
            --notes-file release-notes.md
