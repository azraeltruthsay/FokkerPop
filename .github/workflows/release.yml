name: Build & Release

# Triggers when you push a version tag: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  release:
    name: Build Windows zip & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so scripts/gen-changelog.mjs can read every prior
          # Release commit message. Default fetch-depth: 1 only sees the
          # current tag, which produced a CHANGELOG with a single entry on
          # every previous release.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (exact versions from lock file)
        run: npm ci

      # Fail the release if any high or critical vulnerability exists.
      # Fix it before tagging, or run `npm audit fix` and commit.
      - name: Security audit
        run: npm audit --audit-level=high

      # Gate: HTML validator + semver unit tests. Catches the v0.2.101-style
      # tag-nesting bug and the string-compare version regressions before
      # we ship them to users.
      - name: Verify (HTML + unit tests)
        run: npm test


      # Download the same Node version that's running this job,
      # but the Windows x64 binary, so it's bundled into the zip.
      - name: Download Node.js Windows x64 binary
        run: |
          NODE_VERSION=$(node --version | sed 's/v//')
          echo "Bundling Node.js v${NODE_VERSION} for Windows x64"
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-win-x64.zip" \
               -o node-win.zip
          # Extract just node.exe from the nested folder
          unzip -j node-win.zip "*/node.exe" -d node-bin/

      # Regenerate CHANGELOG.md from git log so the shipped zip always
      # contains the notes for this exact release (plus the previous 24).
      - name: Generate CHANGELOG.md
        run: node scripts/gen-changelog.mjs

      - name: Assemble release package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PKG="FokkerPop-${VERSION}-windows"

          # Install NSIS up front — used for both the FokkerPop.exe launcher
          # (built next) and the FokkerPop-Updater-vX.Y.Z.exe (built later).
          sudo apt-get update && sudo apt-get install -y nsis

          # Build the tiny FokkerPop.exe launcher. Double-clicking it in
          # Explorer runs launch-hidden.vbs (the same entry point as the
          # Start Menu shortcut / start.bat), so LilFokker gets an EXE in
          # the install folder he can pin to his taskbar like any app.
          cat > launcher.nsi << EOF
          Name "FokkerPop"
          OutFile "FokkerPop.exe"
          RequestExecutionLevel user
          SilentInstall silent
          Icon "build-assets/fokkerpop.ico"

          VIProductVersion "${VERSION#v}.0"
          VIAddVersionKey "ProductName" "FokkerPop"
          VIAddVersionKey "FileDescription" "FokkerPop Launcher"
          VIAddVersionKey "LegalCopyright" "FokkerPop"
          VIAddVersionKey "FileVersion" "${VERSION#v}"
          VIAddVersionKey "ProductVersion" "${VERSION#v}"

          Section
            ; Hand off to launch-hidden.vbs (same dir as this exe). Exec is
            ; non-blocking so the launcher process exits in ~1 second and
            ; only the server's FokkerPop.exe remains in Task Manager.
            SetOutPath "\$EXEDIR"
            Exec 'wscript.exe "\$EXEDIR\\launch-hidden.vbs"'
          SectionEnd
          EOF
          makensis -V2 launcher.nsi

          # Create directory structure
          mkdir -p "${PKG}/node"
          mkdir -p "${PKG}/assets/stickers"
          mkdir -p "${PKG}/assets/sounds"
          mkdir -p "${PKG}/characters"
          mkdir -p "${PKG}/plugins"

          # Bundled Node runtime — named FokkerPop.exe so Task Manager shows the right name
          cp node-bin/node.exe "${PKG}/node/FokkerPop.exe"

          # The launcher users double-click (separate from the node runtime).
          cp FokkerPop.exe "${PKG}/FokkerPop.exe"
          # Ship the ico too so the NSIS updater's Start Menu shortcuts can
          # reuse it without shelling out to ResourceHacker.
          cp build-assets/fokkerpop.ico "${PKG}/fokkerpop.ico"

          # Source files
          cp -r server dashboard shared "${PKG}/"
          cp overlay.html overlay-widgets.js package.json package-lock.json \
             settings.example.json goals.example.json redeems.example.json flows.example.json commands.example.json widgets.example.json \
             start.bat stop.bat launch-hidden.vbs README.md CHANGELOG.md \
             "${PKG}/"

          # Copy asset files from repo if they exist
          [ -d assets ]     && cp -r assets/.     "${PKG}/assets/"
          [ -d characters ] && cp -r characters/. "${PKG}/characters/"

          # Vendored node_modules — frozen at audited versions.
          # Exclude .bin/ (Unix symlinks — not needed on Windows).
          cp -r node_modules "${PKG}/"
          rm -rf "${PKG}/node_modules/.bin"

          # Zip it up
          zip -r "${PKG}.zip" "${PKG}/"

          # Create NSIS Auto-Updater (NSIS already installed above for the
          # launcher build).
          cat > updater.nsi << 'EOF'
          Name "FokkerPop Updater __VERSION__"
          OutFile "FokkerPop-Updater-__VERSION__.exe"
          RequestExecutionLevel user

          ; Remember the install location between updates.
          ; Priority: previously-remembered dir > the folder the EXE was run from.
          InstallDirRegKey HKCU "Software\FokkerPop" "InstallDir"
          InstallDir "$EXEDIR"

          DirText "Pick the folder to install or update FokkerPop in. If you already have FokkerPop installed, choose that folder to overwrite it in place." "Destination folder"

          Page directory
          Page instfiles

          Section "Update"
            ; Terminate any running FokkerPop instance — Windows holds an exclusive
            ; lock on the bundled node\FokkerPop.exe while it's running, which
            ; would otherwise break the file overwrite below. Two passes with
            ; sleeps in between cover races with still-initializing processes.
            DetailPrint "Closing any running FokkerPop instance…"
            ExecWait 'taskkill /F /IM FokkerPop.exe /T'
            Sleep 1500
            ExecWait 'taskkill /F /IM FokkerPop.exe /T'
            Sleep 500

            SetOutPath "$INSTDIR"
            SetOverwrite on
            ClearErrors
            File /r "__PKG__\*.*"
            IfErrors 0 +3
              ; /SD IDOK: in silent (/S) auto-update mode, auto-dismiss and abort.
              ; In attended mode, LilFokker sees the error and knows what to do.
              MessageBox MB_OK|MB_ICONEXCLAMATION "FokkerPop Updater could not overwrite files. The FokkerPop server is still running.$\r$\n$\r$\nClose the black FokkerPop terminal window (and any FokkerPop.exe in Task Manager), then run this updater again." /SD IDOK
              Abort

            ; Persist the chosen install dir so next update defaults here again.
            WriteRegStr HKCU "Software\FokkerPop" "InstallDir" "$INSTDIR"

            ; Start Menu shortcuts — make FokkerPop discoverable like a normal
            ; Windows app so LilFokker doesn't need to hunt for start.bat in
            ; Explorer every time. All three point inside $INSTDIR so they
            ; keep working after future updates. The primary shortcut points
            ; at FokkerPop.exe (the launcher built earlier in this workflow)
            ; so it matches what double-clicking the exe in Explorer does.
            CreateDirectory "$SMPROGRAMS\FokkerPop"
            Delete "$SMPROGRAMS\FokkerPop\*.lnk"
            CreateShortCut "$SMPROGRAMS\FokkerPop\FokkerPop.lnk" "$INSTDIR\FokkerPop.exe" "" "$INSTDIR\FokkerPop.exe" 0 SW_SHOWNORMAL "" "Start FokkerPop (hidden server + dashboard in browser)"
            CreateShortCut "$SMPROGRAMS\FokkerPop\FokkerPop (Diagnostics).lnk" "$INSTDIR\start.bat" "" "$INSTDIR\FokkerPop.exe" 0 SW_SHOWNORMAL "" "Start FokkerPop with diagnostic output visible"
            CreateShortCut "$SMPROGRAMS\FokkerPop\Stop FokkerPop.lnk" "$INSTDIR\stop.bat" "" "$INSTDIR\FokkerPop.exe" 0 SW_SHOWNORMAL "" "Stop the FokkerPop server"

            ; Launch the app automatically after update.
            Exec '"$INSTDIR\FokkerPop.exe"'
          SectionEnd
          EOF
          # Interpolate bash vars into the NSI without getting hit by $ clashes.
          sed -i "s|__VERSION__|${VERSION}|g; s|__PKG__|${PKG}|g" updater.nsi

          makensis updater.nsi

          echo "PKG=${PKG}" >> "$GITHUB_ENV"

      # Catch "committed to git but missing from the zip" bugs before they
      # ship. Extracts the zip, boots the server from the extracted copy
      # with a throwaway port, and asserts the critical routes respond.
      # Would have caught v0.2.103-106 shipping without shared/.
      - name: Smoke test the packaged zip
        run: |
          set -eu
          WORK=$(mktemp -d)
          unzip -q "${PKG}.zip" -d "$WORK"
          APP="$WORK/${PKG}"

          # Invariant: the zip must NEVER contain user-data files. NSIS's
          # SetOverwrite on would otherwise clobber the user's layout /
          # goals / credentials on every update. These files are gitignored
          # and created by the server on first boot from *.example.json.
          for f in widgets.json state.json state.json.bak state.json.tmp goals.json redeems.json commands.json flows.json settings.json; do
            if [ -e "$APP/$f" ]; then
              echo "FAIL: $f is in the release zip — updates would overwrite user customizations"
              exit 1
            fi
          done

          # The Windows startup companions must be present; without them,
          # double-clicking start.bat on a fresh install falls back to a
          # visible CMD window (v0.2.x behavior) or fails outright.
          for f in start.bat stop.bat launch-hidden.vbs FokkerPop.exe fokkerpop.ico; do
            if [ ! -e "$APP/$f" ]; then
              echo "FAIL: $f is missing from the release zip"
              exit 1
            fi
          done

          PORT=14747 node "$APP/server/index.js" > "$WORK/smoke.log" 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT

          READY=""
          for i in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:14747/dashboard/ -o /dev/null 2>&1; then
              READY=1; break
            fi
            sleep 0.5
          done

          if [ -z "$READY" ]; then
            echo "FAIL: packaged zip did not boot within 15s"
            echo "--- server log ---"
            cat "$WORK/smoke.log"
            exit 1
          fi

          if grep -qE "ERR_MODULE_NOT_FOUND|Cannot find module|Error \[ERR_" "$WORK/smoke.log"; then
            echo "FAIL: module-resolution error during server boot"
            cat "$WORK/smoke.log"
            exit 1
          fi

          # Explicit route checks for files that have historically been missed.
          for path in /dashboard/ /shared/dice.js /shared/semver.js /overlay-widgets.js /vendor/three.module.min.js /api/release-notes; do
            if ! curl -sSf "http://127.0.0.1:14747$path" -o /dev/null 2>&1; then
              echo "FAIL: $path is not served from the packaged zip"
              echo "--- server log ---"
              cat "$WORK/smoke.log"
              exit 1
            fi
          done

          echo "OK: packaged zip boots cleanly and serves all critical routes"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          PKG="FokkerPop-${VERSION}-windows"

          # Write release notes
          sed 's/^          //' > release-notes.md << NOTES
          ## FokkerPop v${VERSION}

          ### 🚀 FokkerPop Updater (Recommended)
          1. Download \`FokkerPop-Updater-${VERSION}.exe\` below
          2. Double-click it from anywhere.
          3. When the installer asks, pick your **existing FokkerPop folder** to update in place (or pick a new folder for a fresh install), then click Install.
          4. FokkerPop will start automatically when the update finishes. Your settings are safe!

          ### 📦 First-time Install
          1. Download \`FokkerPop-${VERSION}-windows.zip\`
          2. Extract it anywhere and run **start.bat**

          Note: The Updater EXE is now built with NSIS for maximum reliability.

          Node.js is bundled. No setup required.
          NOTES

          gh release create "${VERSION}" \
            "${PKG}.zip#FokkerPop ${VERSION} (Windows ZIP)" \
            "FokkerPop-Updater-${VERSION}.exe#FokkerPop ${VERSION} (Auto-Updater EXE)" \
            --title "FokkerPop ${VERSION}" \
            --notes-file release-notes.md
